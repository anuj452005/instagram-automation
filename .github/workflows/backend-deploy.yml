name: Deploy Backend to Azure App Service

on:
  workflow_dispatch:  # Allow manual triggering
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'db/**'
      - 'drizzle.config.ts'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install All Workspace Dependencies
        run: npm install

      - name: Compile Backend TypeScript
        run: npm run build:backend

      - name: Prepare Production Deployment Package
        # Creates a self-contained zip:
        #   /backend/dist/        - compiled JS (entry: dist/backend/src/index.js)
        #   /backend/package.json - backend dependencies
        #   /db/                  - drizzle schema & migrations
        #   /package.json         - root workspace
        #   /package-lock.json    - lockfile for reproducible installs
        # SCM_DO_BUILD_DURING_DEPLOYMENT=true tells Azure to run npm install on the server
        run: |
          mkdir -p deploy_pkg/backend
          cp -r backend/dist  deploy_pkg/backend/dist
          cp    backend/package.json deploy_pkg/backend/package.json
          cp -r db            deploy_pkg/db
          cp    package.json  deploy_pkg/package.json
          cp    package-lock.json deploy_pkg/package-lock.json
          
          # Create dummy frontend workspace to satisfy npm workspace resolution
          mkdir -p deploy_pkg/frontend
          echo '{"name": "gramflow-frontend", "version": "1.0.0"}' > deploy_pkg/frontend/package.json
          
          cd deploy_pkg
          zip -r ../deploy.zip .
          cd ..
          echo "Package size: $(du -sh deploy.zip | cut -f1)"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: './deploy.zip'
