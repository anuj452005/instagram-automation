name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'db/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Workspace Dependencies
        run: npm install

      - name: Compile Backend TypeScript
        run: npm run build:backend

      - name: Package Artifacts
        # Prepares a clean deployment package.
        # Excludes large development dependencies and frontend code.
        # Azure App Service will run "npm install --production" on the server.
        run: |
          zip -r deploy.zip backend/dist backend/package.json db package.json package-lock.json

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: './deploy.zip'
